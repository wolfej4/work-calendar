services:
  work-calendar:
    build:
      context: .
      dockerfile: Dockerfile
    image: work-calendar:latest
    container_name: work-calendar
    restart: unless-stopped
    ports:
      - "8080:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
