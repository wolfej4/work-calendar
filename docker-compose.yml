# Portainer web-editor stack — paste this AFTER building the image on the host.
# Build once with:  docker build -t work-calendar:latest .
# Or run:           ./build.sh
#
# To rebuild (e.g. after a git pull), re-run build.sh then redeploy the stack.

services:
  work-calendar:
    image: work-calendar:latest
    container_name: work-calendar
    restart: unless-stopped
    ports:
      - "8080:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
