services:
  work-calendar:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: work-calendar
    restart: unless-stopped
    ports:
      - "8888:80"
    depends_on:
      - cors-proxy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  cors-proxy:
    build:
      context: ./proxy
      dockerfile: Dockerfile
    container_name: work-calendar-proxy
    restart: unless-stopped
    volumes:
      - calendar-data:/data   # settings.json persists here across redeploys

volumes:
  calendar-data:
