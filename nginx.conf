server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    # SPA — all unknown paths serve index.html
    location / {
        try_files $uri $uri/ /index.html;

        # Enable Screen Wake Lock API from all origins
        add_header Permissions-Policy "screen-wake-lock=*";
        add_header X-Content-Type-Options "nosniff";

        # HTML must not be cached so the SW update cycle works
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Vite asset files are content-hashed — cache forever
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header Permissions-Policy "screen-wake-lock=*";
    }

    # Service worker — never cache
    location ~* /sw\.js$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Manifest
    location /manifest.webmanifest {
        add_header Cache-Control "no-cache";
        add_header Content-Type "application/manifest+json";
    }
}
